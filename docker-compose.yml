version: '3.8'

services:
  backend:
    image: python:3.11-slim
    container_name: amazon_backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://admin:123456@host.docker.internal:5200/amazon_scraper
      INPUT_FOLDER: /app/app/scraper/amazon_data
      PROCESSED_DATA_DIR: /app/app/scraper/processed_data
      NAS_SHARE_PATH: /nas
      DISTRIBUTED_MODE: "true"
      TZ: Asia/Shanghai
    volumes:
      - ./backend:/app
      - //192.168.40.3/钟正洋/amazon_scraper:/nas  # 0421新增 挂载 NAS
    ports:
      - "8889:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # 移除 healthcheck（因为没有 curl）
    command: >
      sh -c "
      pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: nginx:alpine
    container_name: amazon_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8881:80"
    depends_on:
      - backend
    restart: on-failure